# CI Profile: used in GitHub Actions
# Disable Redis (not available in CI) and Docker Compose auto-start
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.docker.compose.autoconfigure.DockerComposeAutoConfiguration
spring.cache.type=none

# Disable Hibernate second-level cache for test isolation
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# Reduce noisy logs in CI
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO
spring.jpa.show-sql=false
