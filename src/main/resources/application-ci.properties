# CI Profile: used in GitHub Actions
# Disable Redis (not available in CI)
spring.autoconfigure.exclude=org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration
spring.cache.type=none

# Disable Docker Compose integration (Postgres is provided by CI service container)
spring.docker.compose.enabled=false

# Disable Hibernate second-level cache for test isolation
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# Reduce noisy logs in CI
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO
spring.jpa.show-sql=false

# JWT: safe CI-only default (min 64 chars for HMAC-SHA256).
# Overridden by JWT_SECRET env var when set (production).
app.jwt.secret=${JWT_SECRET:ci-only-jwt-secret-not-used-in-production-must-be-at-least-64-chars-long}
