# CI/CD Pipeline: Test + Coverage -> Build + Push -> Deploy
# Single pipeline, 3 jobs in sequence via needs:
#   test -> docker-build-push -> deploy (main push only)

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ------------------------------------------------------------------ #
  # 1) Tests + JaCoCo coverage (with Postgres service container)        #
  #    Quality gate: 40% line + branch on services + controllers        #
  # ------------------------------------------------------------------ #
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: djaj_bladi
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests and generate coverage report
        env:
          SPRING_PROFILES_ACTIVE: ci
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/djaj_bladi
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          JWT_SECRET: ci-only-jwt-secret-not-used-in-production-must-be-at-least-64-chars-long
        run: ./mvnw -B verify --file pom.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Post coverage summary on PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Coverage Report (services + controllers)"
          min-coverage-overall: 40
          min-coverage-changed-files: 40
          update-comment: true

      - name: Print coverage summary to job log
        if: always()
        run: |
          if [ -f target/site/jacoco/jacoco.xml ]; then
            echo "--- JaCoCo Coverage Summary ---"
            python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse("target/site/jacoco/jacoco.xml")
          root = tree.getroot()
          for counter in root.findall("counter"):
              ctype = counter.get("type")
              missed = int(counter.get("missed", 0))
              covered = int(counter.get("covered", 0))
              total = missed + covered
              pct = (covered / total * 100) if total > 0 else 0
              print(f"{ctype:<12} {covered:>6}/{total:<6} ({pct:.1f}%)")
          EOF
          else
            echo "No jacoco.xml found - coverage report was not generated"
          fi

  # ------------------------------------------------------------------ #
  # 2) Build Docker image and push to Docker Hub                        #
  #    Runs only after test & coverage passes                           #
  #    Push only on main branch pushes (skipped on PRs)                #
  # ------------------------------------------------------------------ #
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/djaj-bladi-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/djaj-bladi-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------ #
  # 3) Deploy to Azure VM via SSH                                       #
  #    Runs only after docker-build-push succeeds AND on main push only #
  #    Pulls pre-built image from Docker Hub - no rebuild on VM         #
  # ------------------------------------------------------------------ #
  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          envs: DOCKER_HUB_USERNAME,DOCKER_HUB_TOKEN,POSTGRES_PASSWORD,JWT_SECRET
          script: |
            set -e
            mkdir -p /opt/djaj-bladi
            cd /opt/djaj-bladi

            # Write compose.prod.yaml directly (no git credentials needed on VM)
            cat > compose.prod.yaml << 'COMPOSE_EOF'
            services:
              app:
                image: ${DOCKER_IMAGE:-mohamedhmidouch/djaj-bladi-backend:latest}
                container_name: djaj-bladi-app
                environment:
                  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/djaj_bladi
                  SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
                  SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
                  SPRING_PROFILES_ACTIVE: default
                  REDIS_HOST: redis
                  REDIS_PORT: "6379"
                  PORT: "8080"
                  SPRING_DOCKER_COMPOSE_SKIP: "true"
                  SPRING_DEVTOOLS_RESTART_ENABLED: "false"
                  JWT_SECRET: ${JWT_SECRET}
                ports:
                  - "8080:8080"
                networks:
                  - djaj-network
                depends_on:
                  postgres:
                    condition: service_healthy
                  redis:
                    condition: service_healthy
                restart: always
                healthcheck:
                  test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 60s
              postgres:
                image: postgres:16-alpine
                container_name: djaj-bladi-postgres
                environment:
                  POSTGRES_DB: djaj_bladi
                  POSTGRES_USER: ${POSTGRES_USER:-postgres}
                  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                ports:
                  - "127.0.0.1:5432:5432"
                volumes:
                  - /opt/djaj-bladi/data/postgres:/var/lib/postgresql/data
                networks:
                  - djaj-network
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d djaj_bladi"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                restart: always
              redis:
                image: redis:7-alpine
                container_name: djaj-bladi-redis
                ports:
                  - "127.0.0.1:6379:6379"
                volumes:
                  - /opt/djaj-bladi/data/redis:/data
                networks:
                  - djaj-network
                healthcheck:
                  test: ["CMD", "redis-cli", "ping"]
                  interval: 10s
                  timeout: 3s
                  retries: 5
                command: redis-server --appendonly yes --appendfsync everysec --save 900 1 --save 300 10
                restart: always
            networks:
              djaj-network:
                driver: bridge
            COMPOSE_EOF

            # Write .env securely: secrets arrive as env vars, never in the script string
            printf 'POSTGRES_USER=postgres\nPOSTGRES_PASSWORD=%s\nJWT_SECRET=%s\nDOCKER_IMAGE=%s/djaj-bladi-backend:latest\n' \
              "$POSTGRES_PASSWORD" "$JWT_SECRET" "$DOCKER_HUB_USERNAME" > .env
            chmod 600 .env

            # Pull pre-built image from Docker Hub
            echo "$DOCKER_HUB_TOKEN" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin
            docker compose -f compose.prod.yaml pull

            # Zero-downtime-ish restart
            docker compose -f compose.prod.yaml down
            docker compose -f compose.prod.yaml up -d

            docker logout

            docker compose -f compose.prod.yaml ps
            echo "Deployment complete"
