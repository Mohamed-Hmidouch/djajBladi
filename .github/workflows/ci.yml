# CI Pipeline: Test + Coverage + Build Docker Image
# Runs on every push/PR to main

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ------------------------------------------------------------------ #
  # 1) Tests + JaCoCo coverage (with Postgres service container)        #
  #    Quality gate: 40% line + branch on services + controllers        #
  # ------------------------------------------------------------------ #
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: djaj_bladi
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests and generate coverage report
        env:
          SPRING_PROFILES_ACTIVE: ci
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/djaj_bladi
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          JWT_SECRET: ci-test-jwt-secret-that-is-long-enough-for-hmac-sha256-algorithm-validation
        run: ./mvnw -B verify --file pom.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Post coverage summary on PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "Coverage Report (services + controllers)"
          min-coverage-overall: 40
          min-coverage-changed-files: 40
          update-comment: true

      - name: Print coverage summary to job log
        if: always()
        run: |
          if [ -f target/site/jacoco/jacoco.xml ]; then
            echo "--- JaCoCo Coverage Summary ---"
            grep -oP '(?<=<counter type="LINE" missed=")[0-9]+(?=" covered=")[0-9]+' target/site/jacoco/jacoco.xml || true
            python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse("target/site/jacoco/jacoco.xml")
          root = tree.getroot()
          for counter in root.findall("counter"):
              ctype = counter.get("type")
              missed = int(counter.get("missed", 0))
              covered = int(counter.get("covered", 0))
              total = missed + covered
              pct = (covered / total * 100) if total > 0 else 0
              print(f"{ctype:<12} {covered:>6}/{total:<6} ({pct:.1f}%)")
          EOF
          else
            echo "No jacoco.xml found - coverage report was not generated"
          fi

  # ------------------------------------------------------------------ #
  # 2) Build Docker image (proves the JAR + Dockerfile are valid)       #
  # ------------------------------------------------------------------ #
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: djaj-bladi-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
