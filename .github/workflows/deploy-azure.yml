# Deploy to Azure VM via SSH
# Triggers ONLY after CI workflow passes on main, or manually
#
# Required GitHub Secrets:
#   AZURE_VM_HOST: IP or hostname of Azure VM
#   AZURE_VM_USER: SSH username
#   AZURE_VM_SSH_KEY: Private SSH key for authentication
#   POSTGRES_PASSWORD: Production database password
#   JWT_SECRET: Production JWT signing secret

name: Deploy to Azure VM

on:
  workflow_run:
    workflows: [ "CI" ]
    types: [ completed ]
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            cd /opt/djaj-bladi/app
            git pull origin main

            # Create .env from GitHub secrets
            echo "POSTGRES_USER=postgres" > .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env

            # Rebuild and restart containers
            docker compose -f compose.prod.yaml down
            docker compose -f compose.prod.yaml up -d --build

            # Show status
            docker compose -f compose.prod.yaml ps
            echo "Deployment complete"
